version: "3"

services:
  prom-server:
    image: prom/prometheus
    ports:
      - 9090:9090
    volumes:
      - ./prometheus-config.yml:/etc/prometheus/prometheus.yml

# To run this docker file use - docker compose up

# Now to run the docker for grafana use this - docker run -d -p 3000:3000 --name=grafana grafana/grafana-oss


