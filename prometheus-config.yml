global:
  # Scrape frequently for demo dashboards so panel updates feel near real-time.
  scrape_interval: 4s

scrape_configs:
  # This job scrapes the Express app metrics endpoint (not Prometheus itself).
  - job_name: express-app
    static_configs:
      # Use host.docker.internal so the Prometheus container can reach the app running on the Windows host.
      - targets: ["host.docker.internal:8000"]

  # This job scrapes node-exporter to provide node_* metrics required by most imported CPU dashboards.
  - job_name: node-exporter
    static_configs:
      # Use compose service DNS name so Prometheus resolves node-exporter on the internal Docker network.
      - targets: ["node-exporter:9100"]

# Scrape every 4 seconds.